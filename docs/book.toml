[book]
title = "raptor"
description = "A hawkBit-compatible OTA update server in Rust"
authors = ["Richard Osterloh"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/rosterloh/raptor"
edit-url-template = "https://github.com/rosterloh/raptor/edit/main/docs/{path}"
smart-punctuation = true

[output.html.fold]
enable = true
level = 1

[output.html.playground]
runnable = false
