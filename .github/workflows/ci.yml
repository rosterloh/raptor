name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown, components: clippy }
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@v1.20.1
      # pinned to match the crate's `dioxus = "=0.7.9"`; --force works around
      # Swatinem/rust-cache restoring ~/.cargo bin metadata without the binary,
      # which makes binstall skip a reinstall and leaves `dx` missing on PATH
      - run: cargo binstall dioxus-cli@0.7.9 --no-confirm --force
      # embed-ui test first: it writes placeholder assets into
      # target/dx/raptor-ui/release/web/public, which dx build then replaces
      - run: cargo test -p raptor --features embed-ui --test ui_serving
      - run: cargo clippy -p raptor-ui --target wasm32-unknown-unknown -- -D warnings
      - run: cargo test -p raptor-ui
      # last: smoke-build the bundle (debug: skips release wasm-opt; the tagged
      # release pipeline still builds --release). dx must run from workspace root.
      - run: dx build --package raptor-ui

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: raptor
          POSTGRES_PASSWORD: raptor
          POSTGRES_DB: raptor
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U raptor" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # Only raptor's tests touch the DB; each gets its own schema (see
      # tests/common/mod.rs) so they run in parallel without clobbering.
      - run: cargo nextest run -p raptor
        env:
          TEST_DATABASE_URL: postgres://raptor:raptor@localhost:5432/raptor
